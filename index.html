<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รอ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        
        .tab-content { 
            position: absolute;
            top: 0; left: 0; right: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1;
            visibility: hidden;
        }
        .tab-content.active { 
            position: relative;
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
            visibility: visible;
        }

        #fixed-video-wrapper {
            width: 100%; height: 100%;
            background: #000;
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
        }

        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        canvas#ai-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
        
        #sidebar { transition: transform 0.3s ease; z-index: 100; }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="md:hidden flex items-center justify-between p-4 bg-slate-900 border-b border-slate-800 sticky top-0 z-[60]">
        <h1 class="text-xl font-bold text-blue-500"><i class="fa-solid fa-bolt-lightning mr-2"></i>EDUSMART</h1>
        <button onclick="toggleSidebar()" class="text-2xl text-white p-2"><i class="fa-solid fa-bars"></i></button>
    </header>

    <aside id="sidebar" class="w-64 bg-slate-900 h-screen fixed left-0 top-0 flex-col p-6 border-r border-slate-800 flex">
        <h1 class="hidden md:block text-2xl font-bold text-blue-500 mb-10 tracking-tighter"><i class="fa-solid fa-bolt-lightning mr-2"></i>รอ</h1>
        <nav class="space-y-3">
            <button onclick="switchTab('monitor')" class="tab-btn w-full flex items-center p-4 rounded-xl bg-slate-800 text-white transition-all"><i class="fa-solid fa-robot mr-3"></i>AI Monitor</button>
            <button onclick="switchTab('classroom')" class="tab-btn w-full flex items-center p-4 rounded-xl hover:bg-slate-800 transition-all"><i class="fa-solid fa-book-open mr-3"></i>Classroom</button>
            <button onclick="switchTab('chat')" class="tab-btn w-full flex items-center p-4 rounded-xl hover:bg-slate-800 transition-all"><i class="fa-solid fa-comment-dots mr-3"></i>AI Counselor</button>
        </nav>
    </aside>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <main class="md:ml-64 p-4 md:p-10">
        <section id="monitor" class="tab-content active">
            <div class="mb-6">
                <h2 class="text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">AI FOCUS TRACKER</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass rounded-3xl overflow-hidden relative shadow-2xl min-h-[300px] md:min-h-[450px]">
                    <div id="fixed-video-wrapper">
                        <video id="webcam" class="w-full h-full object-cover scale-x-[-1]" autoplay playsinline muted></video>
                        <canvas id="ai-canvas" class="w-full h-full scale-x-[-1]"></canvas>
                        <div id="loading-ai" class="absolute inset-0 flex items-center justify-center bg-slate-900/80 z-10">
                            <div class="text-center">
                                <i id="loading-icon" class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-2"></i>
                                <p id="loading-text">กำลังโหลดระบบ...</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="glass p-6 rounded-3xl text-center">
                        <p class="text-slate-400 text-xs mb-2 uppercase tracking-widest">Focus Status</p>
                        <h3 id="focus-label" class="text-2xl font-black text-slate-500 italic">Ready</h3>
                    </div>
                    <div class="glass p-4 rounded-3xl h-48"><canvas id="liveChart"></canvas></div>
                </div>
            </div>
        </section>

        <section id="classroom" class="tab-content">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-emerald-400">CLASSROOM</h2>
                <p class="text-slate-400 text-sm">เลือกบทเรียนเพื่อเริ่มตรวจจับโฟกัส</p>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <button onclick="showTopicList('physics')" class="glass p-6 rounded-3xl border-b-4 border-blue-500 hover:bg-blue-600/10 transition">
                    <i class="fa-solid fa-atom text-3xl text-blue-500 mb-2"></i><p>ฟิสิกส์</p>
                </button>
                <button onclick="showTopicList('chemistry')" class="glass p-6 rounded-3xl border-b-4 border-emerald-500 hover:bg-emerald-600/10 transition">
                    <i class="fa-solid fa-flask text-3xl text-emerald-500 mb-2"></i><p>เคมี</p>
                </button>
                <button onclick="showTopicList('biology')" class="glass p-6 rounded-3xl border-b-4 border-red-500 hover:bg-red-600/10 transition">
                    <i class="fa-solid fa-dna text-3xl text-red-500 mb-2"></i><p>ชีวะ</p>
                </button>
                <button onclick="showTopicList('math')" class="glass p-6 rounded-3xl border-b-4 border-yellow-500 hover:bg-yellow-600/10 transition">
                    <i class="fa-solid fa-calculator text-3xl text-yellow-500 mb-2"></i><p>คณิตศาสตร์</p>
                </button>
            </div>
            <div id="topic-container" class="glass p-6 rounded-[2rem] hidden border border-slate-700">
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                    <h3 id="selected-subject-title" class="text-xl font-bold"></h3>
                    <button onclick="closeTopics()" class="bg-slate-800 hover:bg-slate-700 px-4 py-1 rounded-lg text-sm">ปิด</button>
                </div>
                <div id="topic-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </section>

        <section id="chat" class="tab-content h-[80vh]">
            <h2 class="text-2xl font-bold mb-4 text-blue-400">AI COUNSELOR</h2>
            <div class="glass h-full rounded-[2rem] flex flex-col overflow-hidden">
                <div id="chat-window" class="flex-1 p-6 overflow-y-auto"></div>
                <div class="p-4 bg-slate-900/50 flex gap-2">
                    <input type="text" class="flex-1 bg-slate-800 p-4 rounded-xl outline-none" placeholder="ถาม AI เรื่องบทเรียน...">
                    <button onclick="askAI()" class="bg-blue-600 px-6 rounded-xl hover:bg-blue-500 transition-all">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const videoElement = document.getElementById('webcam');
        const focusLabel = document.getElementById('focus-label');
        let focusScore = 80;

        function createFakeStream() {
            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            const ctx = canvas.getContext('2d');
            setInterval(() => {
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, 640, 480);
                ctx.fillStyle = '#333';
                ctx.fillText('NO CAMERA DETECTED', 250, 240);
            }, 100);
            return canvas.captureStream();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        }
        
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-slate-800', 'text-white');
                if(b.getAttribute('onclick').includes(id)) b.classList.add('bg-slate-800', 'text-white');
            });
            if (window.innerWidth < 768) toggleSidebar();
        }

        function checkGaze(landmarks) {
            if(!landmarks) return false;
            const eyeDistance = landmarks[145].y - landmarks[159].y;
            const isEyeOpen = eyeDistance > 0.012; 
            const leftIris = landmarks[468];
            const isLookingCenter = leftIris && (leftIris.x > 0.35 && leftIris.x < 0.65);
            return isEyeOpen && isLookingCenter;
        }

        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        faceMesh.onResults((results) => {
            document.getElementById('loading-ai').style.display = 'none';
            let isFocused = false;
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                isFocused = checkGaze(results.multiFaceLandmarks[0]);
            }

            if (isFocused) {
                focusScore = Math.min(focusScore + 0.6, 100);
                focusLabel.innerText = "กำลังตั้งใจเรียน";
                focusLabel.className = "text-2xl font-black text-emerald-400 italic";
            } else {
                focusScore = Math.max(focusScore - 0.8, 0);
                focusLabel.innerText = "หลับตา / มองที่อื่น";
                focusLabel.className = "text-2xl font-black text-rose-500 italic";
            }
            updateChart();
        });

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = stream;
            } catch (err) {
                videoElement.srcObject = createFakeStream();
                document.getElementById('loading-icon').className = "fa-solid fa-triangle-exclamation text-amber-500 text-4xl mb-2";
                document.getElementById('loading-text').innerText = "โหมดทดสอบ: ไม่พบกล้อง";
                setTimeout(() => document.getElementById('loading-ai').style.display = 'none', 2000);
            }
            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();
        }
        initCamera();

        async function enablePiP() {
            try {
                if (videoElement.readyState < 2) { alert("ระบบยังไม่พร้อม"); return; }
                if (document.pictureInPictureElement) return;
                await videoElement.requestPictureInPicture();
            } catch (e) { alert("เบราว์เซอร์บล็อกการทำงาน"); }
        }

        async function startLesson(url) {
            if (!document.pictureInPictureElement) await enablePiP();
            setTimeout(() => { window.open(url, '_blank'); }, 600);
        }

        const topicsData = {
            physics: { name: "ฟิสิกส์", color: "blue", items: [{ title: "การเคลื่อนที่แนวตรง", url: "รอใส่ลิ้ง" }, { title: "แรงและกฏการเคลื่อนที่", url: "รอใส่ลิ้ง" }, { title: "สมดุลกล", url: "รอใส่ลิ้ง" }, { title: "งานและพลังงาน", url: "รอใส่ลิ้ง" }, { title: "โมเมนตัมและการชน", url: "รอใส่ลิ้ง" }, { title: "การเคลื่อนที่แบบโพรเจกไทล์", url: "รอใส่ลิ้ง" }] },
            chemistry: { name: "เคมี", color: "emerald", items: [{ title: "ความปลอดภัยในห้องปฏิบัติการ", url: "รอใส่ลิ้ง" }, { title: "อะตอมและตารางธาตุ", url: "รอใส่ลิ้ง" }, { title: "พันธะเคมี", url: "รอใส่ลิ้ง" }, { title: "โมลและสูตรโมเลกุล", url: "รอใส่ลิ้ง" }, { title: "สารละลาย", url: "รอใส่ลิ้งค์" }, { title: "ปริมาณสารสัมพันธ์", url: "รอใส่ลิ้ง" }] },
            math: { name: "คณิตศาสตร์", color: "yellow", items: [{ title: "เซต", url: "รอใส่ลิ้ง" }, { title: "ตรรกศาสตร์", url: "รอใส่ลิ้ง" }, { title: "จำนวนจริง", url: "รอใส่ลิ้ง" }, { title: "ฟังก์ชั่น", url: "รอใส่ลิ้ง" }, { title: "เมทริกซ์", url: "รอใส่ลิ้ง" }, { title: "เลขาคณิตวิเคราะห์", url: "รอใส่ลิ้ง" }] },
            biology: { name: "ชีววิทยา", color: "red", items: [{ title: "เคมีที่เป็นพื้นฐานสิ่งมีชีวิต", url: "รอใส่ลิ้ง" }, { title: "เซลล์ของสิ่งมีชีวิต", url: "รอใส่ลิ้ง" }, { title: "การแบ่งเซลล์", url: "รอใส่ลิ้ง" }, { title: "การย่อยอาหาร", url: "รอใส่ลิ้ง" }, { title: "การหายใจระดับเซลล์", url: "รอใส่ลิ้ง" }] }
        };

        function showTopicList(key) {
            const data = topicsData[key];
            const list = document.getElementById('topic-list');
            document.getElementById('selected-subject-title').innerText = data.name;
            list.innerHTML = data.items.map((item, index) => {
                const orderNumber = String(index + 1).padStart(2, '0');
                return `
                <div class="flex items-center p-4 rounded-xl bg-slate-800/60 border border-slate-700 hover:bg-slate-700/50 transition-all group">
                    <div class="flex-shrink-0 w-10 h-8 flex items-center justify-center rounded-lg bg-${data.color}-500/20 border border-${data.color}-500/40 mr-4">
                        <span class="text-${data.color}-400 font-bold text-xs">${orderNumber}</span>
                    </div>
                    <div class="flex-1"><span class="text-sm font-medium text-slate-200">${item.title}</span></div>
                    <button onclick="startLesson('${item.url}')" class="bg-${data.color}-600 hover:bg-${data.color}-500 px-4 py-2 rounded-lg text-xs font-bold text-white transition-all ml-4">เริ่มเรียน</button>
                </div>`;
            }).join('');
            document.getElementById('topic-container').classList.remove('hidden');
        }

        function closeTopics() { document.getElementById('topic-container').classList.add('hidden'); }

        const chartCtx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(chartCtx, {
            type: 'line',
            data: { labels: Array(10).fill(''), datasets: [{ data: Array(10).fill(80), borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)', pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min:0, max:100, display: false }, x: { display: false } } }
        });
        function updateChart() {
            liveChart.data.datasets[0].data.push(focusScore);
            liveChart.data.datasets[0].data.shift();
            liveChart.update('none');
        }
    </script>

    <script>
        async function askAI() {
            const chatInput = document.querySelector('#chat input');
            const chatWindow = document.getElementById('chat-window');
            const question = chatInput.value.trim();

            if (!question) return;

            // แสดงข้อความของผู้ใช้
            chatWindow.innerHTML += `<div class="mb-4 text-right"><span class="bg-blue-600 p-3 rounded-2xl inline-block text-sm shadow-md">${question}</span></div>`;
            chatInput.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                
                
const response = await fetch('/api/chat', { 
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        prompt: question,
        score: typeof focusScore !== 'undefined' ? Math.round(focusScore) : 0, 
        focusLevel: (typeof focusScore !== 'undefined' && focusScore > 70) ? 'สูง' : 'ต่ำ'
    })
});

                const data = await response.json();
                
                // แสดงคำตอบจาก AI พี่ติวเตอร์
                chatWindow.innerHTML += `<div class="mb-4 text-left"><span class="bg-slate-800 p-3 rounded-2xl inline-block text-sm text-slate-200 border border-slate-700 shadow-lg">🤖 พี่ติวเตอร์: ${data.result}</span></div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;

            } catch (error) {
                chatWindow.innerHTML += `<div class="text-red-400 text-[10px] text-center mb-4 italic">เชื่อมต่อพี่ติวเตอร์ไม่ได้ (เช็คว่ารัน node server.js หรือยัง?)</div>`;
            }
        }

        // ทำให้กด Enter แล้วส่งข้อความได้เลย
        document.querySelector('#chat input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
